<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Skinovate</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f7f5f2;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.login-wrap{width:100%;max-width:460px;}
.login-card{background:#fff;border-radius:16px;border:1px solid #e5e7eb;padding:40px;box-shadow:0 4px 24px rgba(0,0,0,.08);}
.logo{font-size:28px;font-weight:800;color:#2d6a4f;text-align:center;margin-bottom:4px;}
.tagline{font-size:13px;color:#6b7280;text-align:center;margin-bottom:28px;}
.form-group{margin-bottom:16px;}
label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;}
input{width:100%;padding:10px 14px;border:1px solid #e5e7eb;border-radius:8px;font-size:14px;font-family:inherit;outline:none;transition:border .15s;}
input:focus{border-color:#2d6a4f;}
.btn{width:100%;padding:12px;background:#2d6a4f;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:4px;}
.btn:hover{background:#235c42;}
.error{background:#fdecea;color:#c0392b;border:1px solid #fecaca;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;}
.password-wrap{position:relative;}
.password-wrap input{padding-right:42px;}
.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:0;color:#6b7280;font-size:18px;line-height:1;}
.eye-btn:hover{color:#2d6a4f;}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="logo">+ Skinovate</div>
    <div class="tagline">Inventory Management System</div>
    {% for msg in messages %}<div class="error">{{ msg }}</div>{% endfor %}
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" autofocus placeholder="Enter username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="password-wrap">
          <input type="password" name="password" id="password-field" placeholder="Enter password">
          <button type="button" class="eye-btn" onclick="togglePassword()" id="eye-btn">&#128065;</button>
        </div>
      </div>
      <button type="submit" class="btn">Login</button>
    </form>
  </div>
</div>
<script>
function togglePassword() {
  const field = document.getElementById("password-field");
  const btn = document.getElementById("eye-btn");
  if (field.type === "password") {
    field.type = "text";
    btn.innerHTML = "&#128584;";
  } else {
    field.type = "password";
    btn.innerHTML = "&#128065;";
  }
}
</script>
</body>
</html>
