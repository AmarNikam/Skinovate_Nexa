{% extends 'stock/base.html' %}
{% block title %}Confirm Delete{% endblock %}
{% block content %}
<div class="page-header"><div class="page-title">🗑️ Confirm Delete</div></div>
<div class="form-card" style="max-width:500px;">
  <p style="margin-bottom:20px;font-size:15px;">Are you sure you want to delete: <strong>{{ obj }}</strong>?</p>
  <div style="background:var(--danger-light);border:1px solid #fecaca;border-radius:8px;padding:12px 16px;margin-bottom:20px;font-size:13px;color:var(--danger)">
    ⚠️ This will also reverse the stock change. This action cannot be undone.
  </div>
  <form method="post">
    {% csrf_token %}
    <div style="display:flex;gap:12px;">
      <button type="submit" class="btn btn-danger">Yes, Delete</button>
      <a href="{% url back %}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
