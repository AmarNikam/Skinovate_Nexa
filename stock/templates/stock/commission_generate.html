{% extends 'stock/base.html' %}
{% block title %}Generate Commission{% endblock %}
{% block content %}
<div class="page-header">
  <div><div class="page-title">⚡ Generate Commission</div><div class="page-sub">{{ branch.name }}</div></div>
  <a href="{% url 'commission_branch_detail' branch.pk %}" class="btn btn-secondary">← Back</a>
</div>
<div class="form-card" style="max-width:400px;">
  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label class="form-label">Month</label>
      <select name="month" class="form-select">
        {% for i,name in months %}<option value="{{ i }}" {% if i == today.month %}selected{% endif %}>{{ name }}</option>{% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Year</label>
      <select name="year" class="form-select">
        {% for y in years %}<option value="{{ y }}" {% if y == today.year %}selected{% endif %}>{{ y }}</option>{% endfor %}
      </select>
    </div>
    <button type="submit" class="btn btn-primary">⚡ Generate Commission</button>
  </form>
</div>
{% endblock %}
